<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
  <h1 id="title">Student Survey Form</h1>

  <p id="description">
    This form helps us understand student preferences and learning habits.
  </p>

  <form id="survey-form">


    <label id="name-label" for="name">Name</label>
    <input
      id="name"
      type="text"
      placeholder="Enter your name"
      required
    >
    <br><br>
    <label id="email-label" for="email">Email</label>
    <input
      id="email"
      type="email"
      placeholder="Enter your email"
      required
    >

    <br><br>


    <label id="number-label" for="number">Age</label>
    <input
      id="number"
      type="number"
      placeholder="Enter your age"
      min="10"
      max="100"
    >

    <br><br>
    <label>Which option best describes you?</label>
    <select id="dropdown">
      <option>Student</option>
      <option>Working</option>
    </select>

    <br><br>

    <p>Would you recommend this site?</p>
    <input type="radio" name="recommend" value="yes"> Yes
    <input type="radio" name="recommend" value="no"> No

    <br><br>

    <p>What do you want to learn?</p>
    <input type="checkbox" value="html"> HTML
    <input type="checkbox" value="css"> CSS
    <input type="checkbox" value="js"> JavaScript

    <br><br>

    <label>Any comments?</label><br>
    <textarea></textarea>

    <br><br>
    <button id="submit" type="submit">Submit</button>

  </form>

</body>
</html>
  </body>
</html>
